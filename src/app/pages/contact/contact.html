<div class="min-h-screen bg-black text-white px-6 py-16">

  <div class="max-w-2xl mx-auto">

    <h1 class="text-4xl font-bold mb-10 text-center">
      Contact Me
    </h1>

    <form class="space-y-6">

      <!-- Name -->
      <div>
        <label class="block mb-2 text-gray-300">Name</label>
        <input 
          type="text" 
          class="w-full p-3 rounded bg-gray-900 border border-gray-700 focus:outline-none focus:border-purple-600"
        />
      </div>

      <!-- Email -->
      <div>
        <label class="block mb-2 text-gray-300">Email</label>
        <input 
          type="email" 
          class="w-full p-3 rounded bg-gray-900 border border-gray-700 focus:outline-none focus:border-purple-600"
        />
      </div>

      <!-- Message -->
      <div>
        <label class="block mb-2 text-gray-300">Message</label>
        <textarea 
          rows="5"
          class="w-full p-3 rounded bg-gray-900 border border-gray-700 focus:outline-none focus:border-purple-600"
        ></textarea>
      </div>

      <!-- Button -->
      <button 
        type="submit"
        class="w-full bg-purple-600 py-3 rounded-lg hover:bg-purple-700 transition"
      >
        Send Message
      </button>

    </form>

  </div>

</div>
