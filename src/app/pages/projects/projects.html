<div class="min-h-screen bg-black text-white px-6 py-16">

  <h1 class="text-4xl font-bold mb-10 text-center">
    My Projects
  </h1>

  <p class="text-gray-400 text-center mb-10">
    Here are some things I’ve built.
  </p>

    <div class="max-w-4xl mx-auto mb-16">

        <div class="bg-gray-900 rounded-xl p-8 border border-purple-600">

            <h2 class="text-3xl font-bold mb-4">
            Featured Project: Discord Clone
            </h2>

            <p class="text-gray-400 mb-4">
            A real-time chat system built with Java backend and WebSockets, supporting multiple users and live messaging.
            </p>

            <div class="flex gap-2 mb-4">
            <span class="bg-purple-600 px-2 py-1 rounded text-sm">Java</span>
            <span class="bg-purple-600 px-2 py-1 rounded text-sm">WebSockets</span>
            <span class="bg-purple-600 px-2 py-1 rounded text-sm">Angular</span>
            </div>

            <button class="bg-purple-600 px-6 py-2 rounded-lg hover:bg-purple-700">
            View Project
            </button>

        </div>

    </div>

  <!-- Project Grid -->
  <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    <!-- Card 1 -->
    <div *ngFor="let project of projects" 
        class="bg-gray-900 p-6 rounded-xl shadow-lg hover:scale-105 transition">

        <h2 class="text-2xl font-semibold mb-2">
        {{ project.title }}
        </h2>

        <p class="text-gray-400 mb-4">
        {{ project.description }}
        </p>

        <div class="flex gap-2 flex-wrap mb-4">
        <span *ngFor="let tech of project.tech"
                class="bg-purple-600 px-2 py-1 rounded text-sm">
            {{ tech }}
        </span>
        </div>
    </div>
</div>

</div>
